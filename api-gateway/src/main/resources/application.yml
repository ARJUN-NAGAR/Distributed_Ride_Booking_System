server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_LAST
      routes:
        - id: location-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/locations/**
          filters:
            - name: CircuitBreaker
              args:
                name: locationCircuitBreaker
                fallbackUri: forward:/fallback/location

        - id: ride-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/rides/**, /api/v1/auth/**
          filters:
            - name: CircuitBreaker
              args:
                name: rideCircuitBreaker
                fallbackUri: forward:/fallback/ride

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

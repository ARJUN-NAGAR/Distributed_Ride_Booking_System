# Server Configuration
server.port=8084
spring.application.name=matching-service

# Microservice Client Integration (OpenFeign target location)
services.location-service.url=http://localhost:8082

# Kafka Integration Properties
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=matching-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer

# Set trusted packages for JSON Event Deserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.uber.common.event,com.uber.events,com.uber.matchingservice.event

# Logging Configurations
logging.level.com.uber.matchingservice=INFO
